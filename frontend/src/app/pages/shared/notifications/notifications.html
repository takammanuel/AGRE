<div class="container-fluid py-4">
  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="mb-1">
        <i class="bi bi-bell me-2"></i>
        Notifications
      </h2>
      <p class="text-muted mb-0">Gérez vos notifications et alertes</p>
    </div>
    <button 
      *ngIf="notifications.length > 0"
      class="btn btn-outline-primary"
      (click)="markAllAsRead()"
    >
      <i class="bi bi-check-all me-1"></i>
      Tout marquer comme lu
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Chargement...</span>
    </div>
  </div>

  <!-- Liste des notifications -->
  <div *ngIf="!loading" class="card shadow-sm">
    <div class="card-body p-0">
      <!-- Aucune notification -->
      <div *ngIf="notifications.length === 0" class="text-center py-5">
        <i class="bi bi-bell-slash display-4 text-muted mb-3 d-block"></i>
        <h5 class="text-muted">Aucune notification</h5>
        <p class="text-muted">Vous n'avez pas encore de notifications.</p>
      </div>

      <!-- Liste -->
      <div *ngIf="notifications.length > 0" class="list-group list-group-flush">
        <div 
          *ngFor="let notif of notifications"
          class="list-group-item list-group-item-action d-flex align-items-start gap-3 py-3"
          [class.bg-light]="!notif.is_read"
          (click)="markAsRead(notif)"
          style="cursor: pointer;"
        >
          <!-- Icône -->
          <div 
            class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
            [ngClass]="getNotificationClass(notif.type)"
            style="width: 48px; height: 48px;"
          >
            <i class="bi fs-5" [ngClass]="getNotificationIcon(notif.type)"></i>
          </div>

          <!-- Contenu -->
          <div class="flex-grow-1">
            <div class="d-flex justify-content-between align-items-start">
              <h6 class="mb-1" [class.fw-bold]="!notif.is_read">
                {{ notif.titre }}
              </h6>
              <small class="text-muted">{{ formatDate(notif.created_at) }}</small>
            </div>
            <p class="mb-1 text-muted">{{ notif.message }}</p>
            
            <!-- Badge non lu -->
            <span *ngIf="!notif.is_read" class="badge bg-primary">Nouveau</span>
            
            <!-- Lien vers la requête si disponible -->
            <a 
              *ngIf="notif.requete_id"
              [routerLink]="['../messagerie', notif.requete_id]"
              class="btn btn-sm btn-outline-primary mt-2"
              (click)="$event.stopPropagation()"
            >
              <i class="bi bi-chat-dots me-1"></i>
              Voir la conversation
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
