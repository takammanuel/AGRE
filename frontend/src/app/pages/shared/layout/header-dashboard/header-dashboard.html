<header
  class="header-dashboard"
  [style.--role-color]="config.primaryColor"
>
  <div class="header-content">
    <!-- Left: Toggle + Breadcrumb -->
    <div class="header-left">
      <button class="btn-menu-toggle d-lg-none" (click)="onToggleSidebar()">
        <i class="bi bi-list fs-4"></i>
      </button>

      <!-- Breadcrumb -->
      <div class="breadcrumb-section d-none d-md-flex">
        <i class="bi bi-house-door me-2"></i>
        <span class="text-muted">Dashboard</span>
      </div>
    </div>

    <!-- Center: Search (optionnel) -->
    <div class="header-center d-none d-xl-flex">
      <app-search-requete></app-search-requete>
    </div>

    <!-- Right: Actions -->
    <div class="header-right">
      <!-- Quick Actions (selon rôle) -->
      <button class="btn btn-primary-custom me-2 d-none d-md-inline-flex">
        <i class="bi bi-plus-lg me-2"></i>
        <span *ngIf="config.role === 'ETUDIANT'" (click)="navigateToSection(config.role)">Nouvelle requête</span>
        <span *ngIf="config.role === 'AGENT_ACADEMIQUE'" (click)="navigateToSection(config.role)">Traiter requête</span>
        <span *ngIf="config.role === 'RESPONSABLE_PEDAGOGIQUE'" (click)="navigateToSection(config.role)">Approuver</span>
        <span *ngIf="config.role === 'ADMINISTRATEUR'" (click)="navigateToSection(config.role)">Nouvel utilisateur</span>
      </button>

      <!-- Notifications -->
      <div class="notifications-wrapper position-relative">
        <button
          class="btn btn-icon"
          (click)="toggleNotifications()"
          [class.active]="showNotifications"
        >
          <i class="bi bi-bell"></i>
          <span
            *ngIf="notificationCount > 0"
            class="notification-badge"
          >
            {{ notificationCount }}
          </span>
        </button>

        <!-- Dropdown Notifications -->
        <div
          *ngIf="showNotifications"
          class="dropdown-menu dropdown-menu-end show notifications-dropdown"
        >
          <div class="dropdown-header">
            <strong>Notifications</strong>
            <span class="badge bg-primary rounded-pill">{{ notificationCount }}</span>
          </div>

          <div class="notifications-list">
            <!-- Notifications dynamiques -->
            <ng-container *ngIf="notifications.length > 0; else noNotifications">
              <a
                *ngFor="let notif of notifications"
                class="notification-item clickable"
                [class.unread]="!notif.is_read"
                (click)="goToNotificationDetail(notif)"
              >
                <div class="notification-icon" [ngClass]="getNotificationBgClass(notif.type)">
                  <i class="bi" [ngClass]="getNotificationIcon(notif.type)"></i>
                </div>
                <div class="notification-content">
                  <p class="notification-title">{{ notif.titre }}</p>
                  <p class="notification-text">{{ notif.message }}</p>
                  <span class="notification-time">{{ formatTimeAgo(notif.created_at) }}</span>
                </div>
                <i class="bi bi-chevron-right notification-arrow"></i>
              </a>
            </ng-container>

            <!-- Aucune notification -->
            <ng-template #noNotifications>
              <div class="text-center py-4 text-muted">
                <i class="bi bi-bell-slash fs-3 d-block mb-2"></i>
                <p class="mb-0">Aucune notification</p>
              </div>
            </ng-template>
          </div>

          <div class="dropdown-footer">
            <a (click)="goToNotifications()" class="text-primary" style="cursor: pointer;">
              Voir toutes les notifications
            </a>
          </div>
        </div>
      </div>

      <!-- User Menu -->
      <div class="user-menu position-relative">
        <button
          class="btn-user"
          (click)="toggleProfileMenu()"
          [class.active]="showProfileMenu"
        >
          <ng-container *ngIf="currentUser?.photo_url; else defaultIcon">
              <img
                [src]="currentUser.photo_url"
                alt="Photo profil"
                class="rounded-circle"
                style="width: 35px; height: 35px; object-fit: cover;"
              >
            </ng-container>

            <!-- Icône par défaut -->
            <ng-template #defaultIcon>
              <i class="bi bi-person-circle fs-4"></i>
            </ng-template>

          <div class="user-info d-none d-md-block">
            <p class="user-name">{{ currentUser?.prenom }} {{ currentUser?.nom }}</p>
            <p class="user-role">{{ config.roleLabel }}</p>
          </div>
          <i class="bi bi-chevron-down ms-2"></i>
        </button>

        <!-- Dropdown Profile -->
        <div
          *ngIf="showProfileMenu"
          class="dropdown-menu dropdown-menu-end show profile-dropdown"
        >
          <div class="dropdown-header">
            <div class="d-flex align-items-center">
              <div>
                <p class="mb-0 fw-bold">{{ currentUser?.prenom }} {{ currentUser?.nom }}</p>
                <small class="text-muted">{{ currentUser?.email }}</small>
              </div>
            </div>
          </div>
          <div class="dropdown-divider"></div>

          <a class="dropdown-item" (click)="goToProfile()">
            <i class="bi bi-person me-2"></i> Mon profil
          </a>
          <a class="dropdown-item" (click)="goToSettings()">
            <i class="bi bi-gear me-2"></i> Paramètres
          </a>
          <a class="dropdown-item">
            <i class="bi bi-question-circle me-2"></i> Aide
          </a>

          <div class="dropdown-divider"></div>

          <a class="dropdown-item text-danger" (click)="logout()">
            <i class="bi bi-box-arrow-right me-2"></i> Déconnexion
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Overlay -->
  <div
    *ngIf="showProfileMenu || showNotifications"
    class="menu-overlay"
    (click)="closeMenus()"
  ></div>
</header>
