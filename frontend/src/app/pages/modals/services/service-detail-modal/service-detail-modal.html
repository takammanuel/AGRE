<div class="modal fade" [class.show]="showModal" [style.display]="showModal ? 'block' : 'none'" (click)="close()">
  <div class="modal-dialog modal-lg" (click)="$event.stopPropagation()">
    <div class="modal-content">
      <div class="modal-header bg-info text-white">
        <h5 class="modal-title">
          <i class="bi bi-info-circle me-2"></i>
          Détails du service
        </h5>
        <button type="button" class="btn-close btn-close-white" (click)="close()"></button>
      </div>

      <div class="modal-body" *ngIf="service">
        <div class="row">
          <div class="col-md-6 mb-3">
            <h6 class="text-muted">Nom du service</h6>
            <p class="h5">{{ service.nom }}</p>
          </div>

          <div class="col-md-6 mb-3">
            <h6 class="text-muted">ID</h6>
            <p>
              <span class="badge bg-secondary">#{{ service.id }}</span>
            </p>
          </div>
        </div>

        <div class="mb-4">
          <h6 class="text-muted">Description</h6>
          <div class="card">
            <div class="card-body bg-light">
              {{ service.description }}
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6">
            <h6 class="text-muted">Date de création</h6>
            <p class="mb-0">
              <i class="bi bi-calendar-plus me-1"></i>
              {{ service.created_at | date:'dd/MM/yyyy HH:mm' }}
            </p>
          </div>

          <div class="col-md-6">
            <h6 class="text-muted">Dernière modification</h6>
            <p class="mb-0">
              <i class="bi bi-calendar-check me-1"></i>
              {{ service.updated_at | date:'dd/MM/yyyy HH:mm' }}
            </p>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="close()">
          <i class="bi bi-x-circle me-1"></i>
          Fermer
        </button>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop fade" [class.show]="showModal"
     [style.display]="showModal ? 'block' : 'none'"
     (click)="close()"></div>
