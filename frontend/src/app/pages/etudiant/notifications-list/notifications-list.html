<div class="container py-5">
  <div class="notifications-container">
    <!-- En-tête -->
    <div class="page-header">
      <h2 class="page-title">
        <i class="bi bi-bell me-2"></i>
        Notifications
      </h2>
    </div>

    <!-- Card des notifications -->
    <div class="notifications-card">
      <!-- Header avec compteur et actions -->
      <div class="notifications-header" *ngIf="notifications.length > 0">
        <span class="notifications-count">
          {{ getUnreadCount() }} notification(s) non lue(s)
        </span>
        <button
          class="btn-mark-all"
          (click)="markAllAsRead()"
          [disabled]="getUnreadCount() === 0">
          <i class="bi bi-check2-all me-1"></i>
          Tout marquer comme lu
        </button>
      </div>

      <!-- Liste des notifications -->
      <div class="notifications-list">
        <div *ngFor="let notif of notifications"
             class="notification-item"
             [class.unread]="!notif.is_read"
             [class.read]="notif.is_read"
             (click)="navigateToRequete(notif)">

          <div class="notification-content">
            <!-- Icône -->
            <div class="notification-icon">
              <i class="bi bi-chat-left-dots"></i>
            </div>

            <!-- Corps de la notification -->
            <div class="notification-body">
              <div class="notification-header">
                <h6 class="notification-title">
                  {{ notif.titre || 'Nouvelle notification' }}
                </h6>
                <span *ngIf="!notif.is_read" class="badge-new">
                  Nouveau
                </span>
              </div>

              <p class="notification-message">
                {{ notif.message || notif.contenu }}
              </p>

              <div class="notification-meta">
                <i class="bi bi-clock"></i>
                <span>{{ notif.created_at | date:'dd MMM yyyy à HH:mm' }}</span>
              </div>
            </div>

            <!-- Actions -->
            <div class="notification-actions" *ngIf="!notif.is_read">
              <button
                class="btn-mark-read"
                (click)="markAsRead(notif.id, $event)">
                <i class="bi bi-check-lg me-1"></i>
                Marquer comme lu
              </button>
            </div>
          </div>
        </div>

        <!-- État vide -->
        <div *ngIf="notifications.length === 0" class="empty-state">
          <div class="empty-icon">
            <i class="bi bi-bell-slash"></i>
          </div>
          <h6 class="empty-title">Aucune notification</h6>
          <p class="empty-message">
            Vous n'avez aucune notification pour le moment.
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
