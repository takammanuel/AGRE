<div class="container py-5">
  <h2 class="mb-4 text-primary-custom fw-bold">Toutes mes notifications</h2>

  <div class="card shadow-sm border-0">
    <div class="list-group list-group-flush">
      <div *ngFor="let notif of notifications"
           class="list-group-item p-4 border-start border-4"
           [class.border-primary-custom]="!notif.is_read"
           [class.bg-light]="!notif.is_read">

        <div class="d-flex justify-content-between align-items-center">
          <div class="flex-grow-1" style="cursor: pointer;"
               [routerLink]="authService.getUserRole() === 'agent' ? ['/agent/messagerie', notif.requete_id] : ['/etudiant/messagerie', notif.requete_id]"
               (click)="markAsRead(notif.id)">

            <h6 class="mb-1 fw-bold" [class.text-primary-custom]="!notif.is_read">
              {{ notif.titre || 'Information' }}
              <span *ngIf="!notif.is_read" class="badge bg-danger ms-2 small">Nouveau</span>
            </h6>

            <p class="mb-1 text-muted small">
              <i class="bi bi-chat-left-dots me-1"></i>
              {{ notif.message || notif.contenu }}
            </p>

            <small class="text-secondary">
              <i class="bi bi-calendar3 me-1"></i> {{ notif.created_at | date:'dd MMMM yyyy à HH:mm' }}
            </small>
          </div>

          <button *ngIf="!notif.is_read"
                  (click)="markAsRead(notif.id)"
                  class="btn btn-sm btn-outline-primary-custom rounded-pill px-3 ms-3">
            Marquer comme lu
          </button>
        </div>
      </div>

      <div *ngIf="notifications.length === 0" class="p-5 text-center">
        <i class="bi bi-bell-slash fs-1 text-muted d-block mb-3"></i>
        <p class="text-muted mb-0">Vous n'avez aucune notification pour le moment.</p>
      </div>
    </div>
  </div>
</div>
