<div class="container py-5">
  <h2 class="mb-4 text-primary-custom fw-bold">Toutes mes notifications</h2>

  <div class="card shadow-sm border-0">
    <div class="list-group list-group-flush">
      <div *ngFor="let notif of notifications"
           class="list-group-item p-4 border-start border-4"
           [class.border-primary-custom]="!notif.is_read"
           [class.bg-light]="!notif.is_read">

        <div class="d-flex justify-content-between align-items-center">
          <div class="flex-grow-1">
            <h6 class="mb-1 fw-bold" [class.text-primary-custom]="!notif.is_read">
              {{ notif.titre }}
            </h6>
            <p class="mb-1 text-muted small">{{ notif.message }}</p>
            <small class="text-secondary">
              <i class="bi bi-calendar3 me-1"></i> {{ notif.created_at | date:'dd MMMM yyyy' }}
            </small>
          </div>

          <button *ngIf="!notif.is_read"
                  (click)="markAsRead(notif.id)"
                  class="btn btn-sm btn-outline-primary-custom rounded-pill px-3">
            Marquer comme lu
          </button>
        </div>
      </div>

      <div *ngIf="notifications.length === 0" class="p-5 text-center">
        <p class="text-muted mb-0">Vous n'avez aucune notification pour le moment.</p>
      </div>
    </div>
  </div>
</div>
