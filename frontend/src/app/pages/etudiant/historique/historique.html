<div class="container mt-4">
  <h3><i class="fas fa-archive"></i> Mon Historique</h3>
  <hr>

  <div *ngIf="loading" class="text-center my-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p>Chargement de vos archives...</p>
  </div>

  <div *ngIf="!loading && historique.length === 0" class="alert alert-light border text-center">
    <p>Aucune requête archivée pour le moment.</p>
  </div>

  <div class="table-responsive" *ngIf="!loading && historique.length > 0">
    <table class="table table-hover border">
      <thead class="table-light">
        <tr>
          <th>Code</th>
          <th>Titre</th>
          <th>Date de clôture</th>
          <th>Statut</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let req of historique">
          <td><strong>{{ req.code_requete }}</strong></td>
          <td>{{ req.titre }}</td>
          <td>{{ req.updated_at | date:'dd/MM/yyyy HH:mm' }}</td>
          <td>
            <span class="badge" [ngClass]="req.statut.includes('Rejet') ? 'bg-danger' : 'bg-success'">
              {{ req.statut }}
            </span>
          </td>
          <td>
            <button class="btn btn-sm btn-outline-primary" (click)="voirDetails(req.id)">
              <i class="fas fa-eye"></i> Voir les messages
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
