<div class="notifications-container">
  <div class="page-header">
    <h1><i class="bi bi-bell"></i> Notifications</h1>
    <button 
      *ngIf="hasUnreadNotifications" 
      (click)="markAllAsRead()" 
      class="btn btn-secondary">
      <i class="bi bi-check-all"></i> Tout marquer comme lu
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="loading-state">
    <div class="spinner"></div>
    <p>Chargement des notifications...</p>
  </div>

  <!-- Error -->
  <div *ngIf="error && !loading" class="error-state">
    <i class="bi bi-exclamation-triangle"></i>
    <p>{{ error }}</p>
    <button (click)="loadNotifications()" class="btn btn-primary">Réessayer</button>
  </div>

  <!-- Liste des notifications -->
  <div *ngIf="!loading && !error" class="notifications-list">
    <div *ngIf="notifications.length === 0" class="empty-state">
      <i class="bi bi-bell-slash"></i>
      <p>Aucune notification</p>
    </div>

    <div 
      *ngFor="let notification of notifications" 
      class="notification-card"
      [class.unread]="!notification.lu"
      [class]="getNotificationClass(notification)"
      (click)="markAsRead(notification)">
      
      <div class="notification-icon">
        <i [class]="'bi ' + getNotificationIcon(notification)"></i>
      </div>

      <div class="notification-content">
        <div class="notification-header">
          <h3>{{ notification.titre }}</h3>
          <span class="notification-date">
            {{ notification.created_at | date: 'dd/MM/yyyy HH:mm' }}
          </span>
        </div>
        <p class="notification-message">{{ notification.message }}</p>
        <a 
          *ngIf="notification.requete_id" 
          [routerLink]="['/etudiant/requetes', notification.requete_id]"
          class="notification-link"
          (click)="$event.stopPropagation()">
          Voir la requête <i class="bi bi-arrow-right"></i>
        </a>
      </div>

      <div class="notification-actions">
        <span *ngIf="!notification.lu" class="unread-badge"></span>
        <button 
          (click)="deleteNotification(notification.id); $event.stopPropagation()" 
          class="btn-delete"
          title="Supprimer">
          <i class="bi bi-trash"></i>
        </button>
      </div>
    </div>
  </div>
</div>
