<div class="container-fluid mt-3">
  <div class="row">
    <div class="col-md-4 border-end" style="height: 80vh; overflow-y: auto;">
      <h5>Mes Requêtes</h5>
      <div class="list-group">
        <a *ngFor="let req of requetes"
           [routerLink]="['/etudiant/messagerie', req.id]"
           class="list-group-item list-group-item-action">
          {{ req.code_requete }} ({{ req.type_requete?.nom }})
        </a>
      </div>
    </div>

    <div class="col-md-8">
      <div *ngIf="requeteId; else noSelect">
        <div class="chat-history p-3 border mb-3" style="height: 400px; overflow-y: auto; background: #f1f1f1;">
          <div *ngFor="let m of messages"
               [ngClass]="m.emetteur_id === monId ? 'text-end' : 'text-start'" class="mb-2">
            <span [ngClass]="m.emetteur_id === monId ? 'bg-primary text-white' : 'bg-white border'"
                  class="d-inline-block p-2 rounded">
              {{ m.contenu }}
            </span>
          </div>
        </div>

        <div class="input-group">
          <input type="text" [(ngModel)]="nouveauMessage" class="form-control">
          <button class="btn btn-primary" (click)="envoyer()">Envoyer</button>
        </div>
      </div>

      <ng-template #noSelect>
        <p class="text-center mt-5">Sélectionnez une requête à gauche pour voir l'historique des messages.</p>
      </ng-template>
    </div>
  </div>
</div>
